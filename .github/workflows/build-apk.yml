name: Build Android APK

on:
  push:
    branches: [ "main", "master", "dev" ]
  workflow_dispatch:   # 允许手动触发

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 配置 Java 17（Gradle 需要 Java 17+）
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. 安装 Flutter SDK（与项目要求的 Dart >=3.10.0 匹配）
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      # 4. 检查 Flutter 环境
      - name: Flutter doctor
        run: flutter doctor -v

      # 5. 获取 simple_live_core 依赖（它有 git 子依赖）
      - name: Get core dependencies
        working-directory: simple_live_core
        run: flutter pub get

      # 6. 获取 App 依赖
      - name: Get app dependencies
        working-directory: simple_live_app
        run: flutter pub get

      # 7. 生成签名密钥（使用 debug key，方便直接安装测试）
      - name: Generate debug keystore
        run: |
          keytool -genkeypair \
            -alias androiddebugkey \
            -keypass android \
            -keystore debug.keystore \
            -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000
          echo "storeFile=$(pwd)/debug.keystore" > simple_live_app/android/key.properties
          echo "storePassword=android" >> simple_live_app/android/key.properties
          echo "keyPassword=android" >> simple_live_app/android/key.properties
          echo "keyAlias=androiddebugkey" >> simple_live_app/android/key.properties

      # 8. 编译 APK（release 模式，同时生成 arm64 + arm32 通用包）
      - name: Build APK
        working-directory: simple_live_app
        run: flutter build apk --release --split-per-abi

      # 9. 同时编译一个通用的 fat APK（兼容所有架构，方便直接安装）
      - name: Build fat APK
        working-directory: simple_live_app
        run: flutter build apk --release

      # 10. 列出产物
      - name: List APK files
        run: find simple_live_app/build/app/outputs -name "*.apk" -type f

      # 11. 上传 APK 产物（在 Actions 页面下载）
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: SimpleLive-APK-v1.11.4
          path: |
            simple_live_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7   # 保存7天后自动清理
